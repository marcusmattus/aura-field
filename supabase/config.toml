# ChakraOS Supabase local / project config
project_id = "chakraos"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "exp://localhost:8081"
additional_redirect_urls = ["aura-field://auth/callback", "exp://localhost:8081/--/auth/callback"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[auth.sms]
enable_signup = false

[storage]
enabled = true
file_size_limit = "50MiB"

[functions]
verify_jwt = true
